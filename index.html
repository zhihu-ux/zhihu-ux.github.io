<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Fox群管机器人使用说明</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<style>
		/* 基础拟态风格（统一所有元素） */
		* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
		body { background: #e0e5ec; color: #4a4a68; line-height: 1.6; padding-bottom: 50px; }
		::-webkit-scrollbar { width: 6px; height: 6px; } 
		::-webkit-scrollbar-thumb { background: #c4c9d2; border-radius: 3px; } 
		::-webkit-scrollbar-track { background: transparent; }

		/* 顶部标题栏（含双搜索栏） */
		.header { 
			background: #e0e5ec; 
			padding: 15px 20px; 
			display: flex; 
			align-items: center; 
			justify-content: space-between; 
			box-shadow: 5px 5px 10px #c4c9d2, -5px -5px 10px #fff; 
			position: sticky; 
			top: 0; 
			z-index: 100; 
			gap: 20px; 
			flex-wrap: wrap; 
		}
		.logo-area { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
		.logo-icon { 
			width: 36px; 
			height: 36px; 
			background: #e0e5ec; 
			box-shadow: inset 3px 3px 6px #c4c9d2, inset -3px -3px 6px #fff; 
			border-radius: 8px; 
			display: flex; 
			align-items: center; 
			justify-content: center; 
			color: #5b5bfd; 
			font-size: 20px; 
		}
		.logo-text { font-size: 22px; font-weight: bold; white-space: nowrap; }
		
		/* 原搜索栏（搜索指令模块） */
		.search-box { 
			display: flex; 
			align-items: center; 
			background: #e0e5ec; 
			box-shadow: inset 3px 3px 6px #c4c9d2, inset -3px -3px 6px #fff; 
			border-radius: 20px; 
			padding: 8px 15px; 
			width: 300px; 
			position: relative; 
			flex: 1; 
			max-width: 400px; 
		}
		.search-box input { 
			background: transparent; 
			border: none; 
			color: #4a4a68; 
			width: 100%; 
			outline: none; 
			font-size: 14px; 
		}
		.search-box input::placeholder { color: #8888a0; } 
		.search-box i { color: #5b5bfd; margin-right: 8px; }
		
		/* 变量搜索栏（仅搜索变量列表） */
		.var-search-box { 
			display: flex; 
			align-items: center; 
			background: #e0e5ec; 
			box-shadow: inset 3px 3px 6px #c4c9d2, inset -3px -3px 6px #fff; 
			border-radius: 20px; 
			padding: 8px 15px; 
			width: 300px; 
			position: relative; 
			flex: 1; 
			max-width: 400px; 
		}
		.var-search-box input { 
			background: transparent; 
			border: none; 
			color: #4a4a68; 
			width: 100%; 
			outline: none; 
			font-size: 14px; 
		}
		.var-search-box input::placeholder { color: #8888a0; } 
		.var-search-box i { color: #28a745; margin-right: 8px; }

		/* 搜索结果浮层（统一风格） */
		.search-result { 
			position: absolute; 
			top: 100%; 
			left: 0; 
			right: 0; 
			background: #e0e5ec; 
			border-radius: 0 0 12px 12px; 
			box-shadow: 5px 5px 10px #c4c9d2, -5px -5px 10px #fff; 
			max-height: 400px; 
			overflow-y: auto; 
			display: none; 
			z-index: 101; 
		}
		.search-result.active { display: block; } 
		.search-result-item { 
			padding: 12px 15px; 
			border-bottom: 1px solid #d1d7e0; 
			cursor: pointer; 
			transition: all 0.2s; 
		}
		.search-result-item:hover { background: #d1d7e0; } 
		.instr-module { font-size: 12px; color: #666; margin-bottom: 4px; } 
		.instr-name { font-weight: 500; color: #4a4a68; margin-bottom: 4px; } 
		.instr-desc { font-size: 12px; color: #666; margin-bottom: 4px; } 
		.instr-example { font-size: 12px; color: #5b5bfd; background: #d1d7e0; padding: 2px 6px; border-radius: 4px; display: inline-block; } 
		.no-result { padding: 12px 15px; color: #666; text-align: center; }

		/* 功能按钮网格 */
		.function-grid { 
			padding: 20px; 
			display: grid; 
			grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
			gap: 20px; 
			max-width: 1200px; 
			margin: 0 auto; 
		}
		.func-btn { 
			background: #e0e5ec; 
			border-radius: 15px; 
			padding: 20px 15px; 
			text-align: center; 
			box-shadow: 5px 5px 10px #c4c9d2, -5px -5px 10px #fff; 
			transition: all 0.3s ease; 
			cursor: pointer; 
			border: none; 
		}
		.func-btn:hover { transform: translateY(-2px); box-shadow: 7px 7px 14px #c4c9d2, -7px -7px 14px #fff; } 
		.func-icon { font-size: 24px; color: #5b5bfd; margin-bottom: 10px; } 
		.func-name { font-size: 16px; color: #4a4a68; font-weight: 500; }

		/* 弹窗样式（拟态，固定标题栏） */
		.modal { 
			display: none; 
			position: fixed; 
			top: 0; 
			left: 0; 
			width: 100%; 
			height: 100%; 
			background: rgba(0,0,0,0.2); 
			z-index: 200; 
			align-items: center; 
			justify-content: center; 
		}
		.modal.active { display: flex; } 
		.modal-content { 
			background: #e0e5ec; 
			border-radius: 20px; 
			width: 90%; 
			max-width: 800px; 
			max-height: 85vh; 
			overflow: hidden; 
			box-shadow: 10px 10px 20px #c4c9d2, -10px -10px 20px #fff; 
			animation: slideUp 0.3s ease; 
			display: flex; 
			flex-direction: column; 
		}
		@keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
		.modal-header { 
			background: #e0e5ec; 
			padding: 15px 20px; 
			border-bottom: 1px solid #d1d7e0; 
			font-size: 18px; 
			color: #5b5bfd; 
			font-weight: 500; 
			display: flex; 
			align-items: center; 
			justify-content: space-between; 
			position: sticky; 
			top: 0; 
			z-index: 10; 
			border-radius: 15px 15px 0 0; 
			flex-shrink: 0; 
		}
		.close-btn { 
			background: #e0e5ec; 
			box-shadow: 3px 3px 6px #c4c9d2, -3px -3px 6px #fff; 
			border: none; 
			font-size: 20px; 
			color: #8888a0; 
			cursor: pointer; 
			padding: 0; 
			width: 30px; 
			height: 30px; 
			display: flex; 
			align-items: center; 
			justify-content: center; 
			border-radius: 50%; 
			transition: all 0.2s; 
		}
		.close-btn:hover { box-shadow: inset 3px 3px 6px #c4c9d2, inset -3px -3px 6px #fff; } 
		.instruction-container { overflow-y: auto; flex: 1; padding: 0; } 
		.instruction-list { padding: 20px; }

		/* 指令/变量卡片（拟态，五类目/三要素） */
		.instr-card { 
			background: #e0e5ec; 
			box-shadow: inset 3px 3px 6px #c4c9d2, inset -3px -3px 6px #fff; 
			border-radius: 12px; 
			padding: 15px; 
			margin-bottom: 15px; 
			border-left: 4px solid #5b5bfd; 
			transition: all 0.2s; 
		}
		.instr-card.highlight { 
			animation: highlight 1.5s ease; 
			border-left: 4px solid #ff6b6b; 
		}
		@keyframes highlight { 
			0% { background: #e0e5ec; } 
			50% { background: #fff3cd; } 
			100% { background: #e0e5ec; } 
		}
		.instr-name { font-weight: 500; color: #4a4a68; margin-bottom: 8px; font-size: 16px; } 
		.instr-desc { color: #666; font-size: 14px; margin-bottom: 8px; } 
		.instr-example { 
			color: #5b5bfd; 
			font-size: 14px; 
			background: #d1d7e0; 
			padding: 5px 10px; 
			border-radius: 6px; 
			display: inline-block; 
			font-family: monospace; 
		}
		.var-type-global { color: #28a745; font-weight: 500; } 
		.var-type-local { color: #fd7e14; font-weight: 500; } 
		.module-tips { 
			background: #fff9db; 
			border-left: 4px solid #ffd43b; 
			padding: 12px 15px; 
			margin: 15px 20px; 
			font-size: 14px; 
			color: #666; 
			border-radius: 0 6px 6px 0; 
		}
		.module-tips strong { color: #e67700; }

		/* 响应式调整 */
		@media (max-width: 992px) { 
			.header { flex-direction: column; align-items: stretch; } 
			.search-box, .var-search-box { width: 100%; max-width: 100%; order: 3; } 
		}
		@media (max-width: 768px) { 
			.logo-text { font-size: 18px; } 
			.function-grid { 
				grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
				padding: 15px; 
				gap: 15px; 
			} 
			.modal-content { width: 95%; max-height: 90vh; } 
			.modal-header { padding: 12px 15px; font-size: 16px; } 
			.instruction-list { padding: 15px; } 
		}
	</style>
</head>
<body>
	<!-- 顶部标题栏（含双搜索栏） -->
	<header class="header">
		<div class="logo-area">
			<div class="logo-icon"><i class="fas fa-robot"></i></div>
			<div class="logo-text">Fox群管机器人使用说明</div>
		</div>

		<!-- 原搜索栏（搜索指令模块） -->
		<div class="search-box">
			<i class="fas fa-search"></i>
			<input type="text" placeholder="搜索指令（名称/说明/示例）..." id="searchInput">
			<div class="search-result" id="searchResult"></div>
		</div>

		<!-- 变量搜索栏（仅搜索变量列表） -->
		<div class="var-search-box">
			<i class="fas fa-filter"></i>
			<input type="text" placeholder="搜索变量（名称/说明/用途）..." id="varSearchInput">
			<div class="search-result" id="varSearchResult"></div>
		</div>
	</header>

	<!-- 功能按钮网格（含所有40个模块：38指令+2变量） -->
	<div class="function-grid" id="functionGrid"></div>

	<!-- 弹窗（指令/变量说明） -->
	<div class="modal" id="instructionModal">
		<div class="modal-content">
			<div class="modal-header">
				<span id="modalTitle">模块名称 - 说明</span>
				<button class="close-btn" id="closeModal">&times;</button>
			</div>
			<div class="instruction-container">
				<div class="instruction-list" id="instructionList"></div>
				<div class="module-tips" id="moduleTips"></div>
			</div>
		</div>
	</div>

	<script>
		// ------------------------------
		// 完整模块数据（38指令模块+2变量模块，去除变量ID24-28）
		// ------------------------------
		const modules = [
			// 1. 群管功能
			{
				name: "群管功能",
				icon: "users-cog",
				content: `清屏|快速清空当前群内机器人可清理的聊天记录,净化群聊界面|清屏[换行]踢@某人|将群内被@的指定成员移出当前群组|踢@小明[换行]踢黑@某人|踢出被@成员并将其加入本群黑名单,禁止其再次申请入群|踢黑@广告号[换行]多群同踢+QQ|在机器人管理的所有授权群内,同步踢出该QQ号码对应的成员|多群同踢12345678[换行]解禁@某人|解除对被@群成员的禁言状态,恢复其发言权限|解禁@小李[换行]禁言@某人 分钟|对被@成员执行禁言,禁言时长为空格后填写的分钟数|禁言@张三 10[换行]一键解禁|一次性解除当前群内所有被禁言成员的禁言限制|一键解禁[换行]全体禁言|开启当前群全员禁言模式,仅管理员与机器人可发言|全体禁言[换行]全体解禁|关闭当前群全员禁言模式,恢复普通成员发言权限|全体解禁[换行]艾特全体+内容|@全体成员并发送指令后跟的提示或通知内容|艾特全体今晚8点开会[换行]撤+QQ 条数|撤回指定QQ号在群内发送的对应条数的聊天消息|撤123456 5[换行]撤以上+条数|撤回当前聊天位置上方指定数量的群内消息|撤以上10[换行]延迟撤回+秒|群成员发送消息后,延迟指定秒数自动撤回该消息|延迟撤回3[换行]自身撤回+秒|机器人自己发送的消息,按设定秒数延迟自动撤回|自身撤回5[换行]发公告+内容|机器人在群内发送设定好的群公告内容|发公告禁止广告刷屏[换行]搜指令+内容|根据关键词查找机器人对应功能的使用方法|搜指令禁言`,
				tips: "本模块所有指令在实际输入使用时，不需要输入加号，直接把指令文字和数字连在一起写即可生效。"
			},
			// 2. 功能开关
			{
				name: "功能开关",
				icon: "toggle-on",
				content: `管理权限开/关|控制机器人在本群是否拥有踢人、禁言、撤回等基础管理权限|管理权限开[换行]菜单权限开/关|控制普通群成员是否可以调用机器人功能菜单指令|菜单权限关[换行]图片模式开/关|控制机器人是否以图片形式展示功能菜单,而非纯文字|图片模式开[换行]引用模式开/关|控制机器人回复消息时,是否引用用户原消息内容|引用模式关[换行]静默模式开/关|开启后机器人减少多余提示输出,只执行核心操作不啰嗦|静默模式开[换行]退群撤回开/关|控制成员退群时,机器人是否自动撤回其在群内的历史消息|退群撤回关[换行]撤回转发开/关|控制撤回违规消息后,是否将记录转发给群管理员留存|撤回转发开[换行]表情回应开/关|控制机器人是否对群消息自动发送表情进行互动回应|表情回应关[换行]整点报时开/关|控制机器人是否在每个整点自动发送报时消息|整点报时开`,
				tips: ""
			},
			// 3. 权限管理
			{
				name: "权限管理",
				icon: "user-shield",
				content: `所有权限开/关|一键全开或全关机器人在本群的全部超管权限|所有权限开[换行]问答权限开/关|控制机器人关键词问答、自动回复功能的超管权限开关|问答权限关[换行]名单权限开/关|控制黑白名单添加、查询、删除等管理功能的超管权限开关|名单权限开[换行]名片权限开/关|控制群名片规范、强制改名等名片管理功能的超管权限开关|名片权限关[换行]审核权限开/关|控制新成员入群条件审核、过滤功能的超管权限开关|审核权限开[换行]验证权限开/关|控制入群人机验证、答题验证功能的超管权限开关|验证权限关[换行]提示权限开/关|控制入群欢迎、退群提醒、违规提示等功能的超管权限开关|提示权限开[换行]广告权限开/关|控制广告检测、违禁词识别屏蔽功能的超管权限开关|广告权限关[换行]定时权限开/关|控制定时消息、定时任务是否正常执行的超管权限开关|定时权限开[换行]循环权限开/关|控制循环播报、重复任务功能是否生效的超管权限开关|循环权限关[换行]引流权限开/关|控制外部引流、微信导流等行为检测的超管权限开关|引流权限开[换行]积分权限开/关|控制积分签到、发言积分、商城等功能的超管权限开关|积分权限关[换行]撤禁权限开/关|控制自动撤回、自动禁言处罚功能的超管权限开关|撤禁权限开[换行]刷屏权限开/关|控制刷屏检测、刷屏惩罚功能的超管权限开关|刷屏权限关[换行]发言权限开/关|控制发言统计、排行榜数据记录的超管权限开关|发言权限开[换行]针对权限开/关|控制是否可对指定用户单独执行撤回、禁言的超管权限开关|针对权限关[换行]头衔权限开/关|控制群头衔自助申请、管理功能的超管权限开关|头衔权限开[换行]清人权限开/关|控制按条件清理僵尸号、低质量成员功能的超管权限开关|清人权限关`,
				tips: "本模块所有开关均为超管专属权限，用于精细化分配机器人功能权限，普通管理员无修改权限。"
			},
			// 4. 撤回系统
			{
				name: "撤回系统",
				icon: "undo",
				content: `设置禁言时间+分钟|设置成员发送违规内容后,系统自动禁言的默认时长|设置禁言时间5[换行]设置号码位数+数量|设置识别手机号、QQ号等违规数字串的判定位数标准|设置号码位数11[换行]撤禁违规提示开/关|执行撤回或禁言操作时,是否在群内公开提示违规行为|撤禁违规提示开[换行]红包撤回开/关|是否自动撤回群内成员发送的红包消息|红包撤回关[换行]图片撤回开/关|是否自动撤回群内发送的图片类消息|图片撤回开[换行]表情撤回开/关|是否自动撤回群内发送的大表情、表情包、动图消息|表情撤回关[换行]语音撤回开/关|是否自动撤回群内发送的语音条消息|语音撤回开[换行]卡片撤回开/关|是否自动撤回群内小程序、分享卡片、商品卡片消息|卡片撤回关[换行]链接撤回开/关|是否自动撤回群内外部网址、推广链接消息|链接撤回开[换行]号码撤回开/关|是否自动撤回群内手机号、QQ号、微信号等数字串消息|号码撤回关[换行]视频撤回开/关|是否自动撤回群内发送的短视频、视频文件消息|视频撤回开[换行]合并撤回开/关|是否自动撤回群内合并转发的聊天记录消息|合并撤回关[换行]鉴黄撤回开/关|是否识别涉黄图片并自动撤回|鉴黄撤回开[换行]二维码撤回开/关|是否自动撤回群内二维码图片类消息|二维码撤回关`,
				tips: ""
			},
			// 5. 禁言系统
			{

		// ------------------------------
		// 预解析数据（分离指令与变量）
		// ------------------------------
		const nonVarInstructions = []; // 非变量模块（38指令）
		const varInstructions = [];     // 变量模块（2变量模块）

		modules.forEach(module => {
			const lines = module.content.split('[换行]');
			if (module.name.includes("变量列表")) {
				// 变量模块：5类目（变量名|类型|说明|用途|示例）
				lines.forEach(line => {
					const parts = line.split('|');
					if (parts.length >= 5) {
						varInstructions.push({
							moduleName: module.name,
							instrName: parts[0].trim(),
							type: parts[1].trim(),
							instrDesc: parts[2].trim(),
							use: parts[3].trim(),
							instrExample: parts[4].trim(),
							moduleTips: module.tips
						});
					}
				});
			} else {
				// 非变量模块：3类目（指令|说明|示例）
				lines.forEach(line => {
					const parts = line.split('|');
					if (parts.length >= 3) {
						nonVarInstructions.push({
							moduleName: module.name,
							instrName: parts[0].trim(),
							instrDesc: parts[1].trim(),
							instrExample: parts[2].trim(),
							moduleTips: module.tips
						});
					}
				});
			}
		});

		// ------------------------------
		// 初始化页面
		// ------------------------------
		document.addEventListener('DOMContentLoaded', () => {
			renderFunctionGrid();
			bindEvents();
		});

		// 渲染功能按钮网格
		function renderFunctionGrid() {
			const grid = document.getElementById('functionGrid');
			grid.innerHTML = '';
			modules.forEach((module, index) => {
				const btn = document.createElement('div');
				btn.className = 'func-btn';
				btn.dataset.index = index;
				btn.innerHTML = `
					<div class="func-icon"><i class="fas fa-${module.icon}"></i></div>
					<div class="func-name">${module.name}</div>
				`;
				grid.appendChild(btn);
			});
		}

		// ------------------------------
		// 绑定事件（双搜索栏+弹窗）
		// ------------------------------
		function bindEvents() {
			// 1. 功能按钮点击：打开弹窗
			document.querySelectorAll('.func-btn').forEach(btn => {
				btn.addEventListener('click', () => {
					const index = btn.dataset.index;
					showInstructionModal(modules[index]);
				});
			});

			// 2. 关闭弹窗
			document.getElementById('closeModal').addEventListener('click', closeModal);
			document.getElementById('instructionModal').addEventListener('click', (e) => {
				if (e.target === e.currentTarget) closeModal();
			});

			// 3. 原搜索栏（搜索指令模块）
			const searchInput = document.getElementById('searchInput');
			const searchResult = document.getElementById('searchResult');
			searchInput.addEventListener('input', (e) => {
				const keyword = e.target.value.trim().toLowerCase();
				searchResult.innerHTML = '';
				searchResult.classList.remove('active');
				if (!keyword) return;

				const matched = nonVarInstructions.filter(item => 
					item.instrName.toLowerCase().includes(keyword) ||
					item.instrDesc.toLowerCase().includes(keyword) ||
					item.instrExample.toLowerCase().includes(keyword)
				);
				
				if (matched.length > 0) {
					matched.forEach(item => {
						const div = document.createElement('div');
						div.className = 'search-result-item';
						div.innerHTML = `
							<div class="instr-module">【${item.moduleName}】</div>
							<div class="instr-name">指令：${highlightKeyword(item.instrName, keyword)}</div>
							<div class="instr-desc">说明：${highlightKeyword(item.instrDesc, keyword)}</div>
							<div class="instr-example">示例：${highlightKeyword(item.instrExample, keyword)}</div>
						`;
						div.addEventListener('click', () => {
							showInstructionModal(modules.find(m => m.name === item.moduleName), item.instrName);
							searchResult.classList.remove('active');
							searchInput.value = '';
						});
						searchResult.appendChild(div);
					});
					searchResult.classList.add('active');
				} else {
					searchResult.innerHTML = '<div class="no-result">未找到匹配的指令</div>';
					searchResult.classList.add('active');
				}
			});

			// 4. 变量搜索栏（仅搜索变量列表）
			const varSearchInput = document.getElementById('varSearchInput');
			const varSearchResult = document.getElementById('varSearchResult');
			varSearchInput.addEventListener('input', (e) => {
				const keyword = e.target.value.trim().toLowerCase();
				varSearchResult.innerHTML = '';
				varSearchResult.classList.remove('active');
				if (!keyword) return;

				const matched = varInstructions.filter(item => 
					item.instrName.toLowerCase().includes(keyword) ||
					item.instrDesc.toLowerCase().includes(keyword) ||
					item.use.toLowerCase().includes(keyword) ||
					item.instrExample.toLowerCase().includes(keyword)
				);
				
				if (matched.length > 0) {
					matched.forEach(item => {
						const div = document.createElement('div');
						div.className = 'search-result-item';
						div.innerHTML = `
							<div class="instr-module">【${item.moduleName}】</div>
							<div class="instr-name">变量：${highlightKeyword(item.instrName, keyword)}</div>
							<div class="instr-desc">说明：${highlightKeyword(item.instrDesc, keyword)}</div>
							<div class="instr-example">用途：${highlightKeyword(item.use, keyword)}</div>
						`;
						div.addEventListener('click', () => {
							showInstructionModal(modules.find(m => m.name === item.moduleName), item.instrName);
							varSearchResult.classList.remove('active');
							varSearchInput.value = '';
						});
						varSearchResult.appendChild(div);
					});
					varSearchResult.classList.add('active');
				} else {
					varSearchResult.innerHTML = '<div class="no-result">未找到匹配的变量</div>';
					varSearchResult.classList.add('active');
				}
			});

			// 5. 点击外部关闭搜索结果
			document.addEventListener('click', (e) => {
				if (!e.target.closest('.search-box')) searchResult.classList.remove('active');
				if (!e.target.closest('.var-search-box')) varSearchResult.classList.remove('active');
			});
		}

		// ------------------------------
		// 工具函数（高亮、弹窗、关闭）
		// ------------------------------
		// 高亮关键词
		function highlightKeyword(text, keyword) {
			if (!keyword) return text;
			const regex = new RegExp(`(${keyword})`, 'gi');
			return text.replace(regex, '<mark style="background:#ffeeba;padding:2px;border-radius:2px;">$1</mark>');
		}
		
		// 显示弹窗（支持定位）
		function showInstructionModal(module, targetName = null) {
			const modal = document.getElementById('instructionModal');
			const modalTitle = document.getElementById('modalTitle');
			const instructionList = document.getElementById('instructionList');
			const moduleTips = document.getElementById('moduleTips');
			const scrollContainer = document.querySelector('.instruction-container');
			
			// 设置标题
			modalTitle.textContent = `${module.name} - ${module.name.includes('变量') ? '变量说明' : '指令说明'}`;
			instructionList.innerHTML = '';
			
			// 生成内容卡片（区分指令/变量）
			const lines = module.content.split('[换行]');
			let targetCard = null;
			lines.forEach(line => {
				const parts = line.split('|');
				if (parts.length >= 3) {
					const card = document.createElement('div');
					card.className = 'instr-card';
					card.dataset.name = parts[0].trim();
					
					if (module.name.includes('变量列表')) {
						// 变量卡片（5类目）
						if (parts.length >= 5) {
							const [varName, type, desc, use, example] = parts.map(p => p.trim());
							card.innerHTML = `
								<div class="instr-name">变量名：${varName}</div>
								<div class="instr-desc">类型：<span class="${type === '全局' ? 'var-type-global' : 'var-type-local'}">${type}</span></div>
								<div class="instr-desc">说明：${desc}</div>
								<div class="instr-desc">用途：${use}</div>
								<div class="instr-example">示例：${example}</div>
							`;
						}
					} else {
						// 指令卡片（3类目）
						card.innerHTML = `
							<div class="instr-name">指令：${parts[0].trim()}</div>
							<div class="instr-desc">说明：${parts[1].trim()}</div>
							<div class="instr-example">示例：${parts[2].trim()}</div>
						`;
					}
					
					instructionList.appendChild(card);
					
					// 记录目标卡片（用于定位）
					if (targetName && card.dataset.name === targetName) targetCard = card;
				}
			});
			
			// 设置提示语
			moduleTips.innerHTML = module.tips ? `<strong>Tips：</strong>${module.tips}` : '';
			modal.classList.add('active');
			
			// 滚动到目标位置（居中）
			requestAnimationFrame(() => {
				if (scrollContainer) {
					if (targetCard) {
						const containerH = scrollContainer.clientHeight;
						const cardH = targetCard.offsetHeight;
						scrollContainer.scrollTop = targetCard.offsetTop - (containerH - cardH) / 2;
						targetCard.classList.add('highlight');
						setTimeout(() => targetCard.classList.remove('highlight'), 1500);
					} else {
						scrollContainer.scrollTop = 0;
					}
				}
			});
		}

		// 关闭弹窗
		function closeModal() {
			document.getElementById('instructionModal').classList.remove('active');
		}
	</script>
</body>
